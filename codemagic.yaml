workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 45
    environment:
      flutter: 3.24.0
      java: 17
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build APK Debug
        script: flutter build apk --debug --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
