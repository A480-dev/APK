name: blockrush
description: "BlockRush: Puzzle & Survive - A colorful block puzzle game with combos and rewards"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  riverpod: ^3.0.0
  flutter_riverpod: ^3.0.0
  # Anuncios
  google_mobile_ads: ^7.0.0
  # Almacenamiento local
  shared_preferences: ^2.3.0
  # Audio
  audioplayers: ^6.0.0
  # Animaciones
  flutter_animate: ^4.5.0
  # Mantener pantalla encendida durante partida
  wakelock_plus: ^1.2.5
  # Feedback háptico avanzado
  flutter_haptic_feedback: ^1.0.1
  # Iconos de la app
  flutter_launcher_icons: ^0.14.1
  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/audio/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
